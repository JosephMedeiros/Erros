<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro {{codigo}} - {{marca}} {{modelo}} | Guia de Resoluçăo</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #d32f2f; }
        .box { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Diagnóstico: Código {{codigo}} ({{marca}})</h1>
    <p>Guia rápido para resoluçăo de falhas no equipamento <strong>{{marca}} {{modelo}}</strong>.</p>
    
    <div class="box">
        <h2>Sintoma Apresentado</h2>
        <p>{{sintoma}}</p>
    </div>

    <div class="box">
        <h2>Como Resolver (Passo a Passo)</h2>
        <p>{{solucao}}</p>
    </div>
</body>
</html>
